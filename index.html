<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>denartes — Follow the Path</title>
  <style>
    :root {
      --bg: #06070b;
      --bg2: #090b10;
      --text: #f5f1ea;
      --muted: #b89d72;
      --line: #d4b07a;
      --line-soft: rgba(212, 176, 122, 0.2);
      --glow: rgba(212, 176, 122, 0.55);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.02), transparent 28%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.055;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35) 0.6px, transparent 0.8px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.25) 0.6px, transparent 0.8px),
        radial-gradient(circle at 40% 70%, rgba(255,255,255,0.2) 0.6px, transparent 0.8px);
      background-size: 12px 12px, 16px 16px, 20px 20px;
      mix-blend-mode: screen;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }

    .hero-inner {
      width: min(900px, 100%);
    }

    .eyebrow {
      color: rgba(184, 157, 114, 0.45);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      font-size: 0.78rem;
      margin-bottom: 1.4rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.25rem, 9vw, 7rem);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.06em;
    }

    .tagline {
      margin: 1.5rem auto 0;
      font-size: clamp(1.2rem, 2.6vw, 2rem);
      line-height: 1.35;
      color: var(--muted);
      max-width: 26rem;
      font-weight: 400;
    }

    .follow-prompt {
      margin-top: 5rem;
      color: rgba(184, 157, 114, 0.68);
      font-size: 0.84rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .arrow {
      display: inline-block;
      margin-left: 0.35rem;
      animation: float 1.8s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: 0.7; }
      50% { transform: translateY(5px); opacity: 1; }
    }

    .path-section {
      position: relative;
      height: 2600px;
      margin-top: -4vh;
    }

    .path-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    #trail {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .trail-glow {
      filter: drop-shadow(0 0 14px rgba(212, 176, 122, 0.35))
              drop-shadow(0 0 30px rgba(212, 176, 122, 0.12));
      opacity: 0.9;
    }

    .trail-base {
      opacity: 0.18;
    }

    .trail-active {
      opacity: 0.95;
    }

    .node-group {
      transform-box: fill-box;
      transform-origin: center;
    }

    .node-core {
      filter: drop-shadow(0 0 10px rgba(212, 176, 122, 0.95))
              drop-shadow(0 0 24px rgba(212, 176, 122, 0.6))
              drop-shadow(0 0 42px rgba(212, 176, 122, 0.38));
    }

    .spacer {
      height: 35vh;
    }

    @media (max-width: 900px) {
      .path-section { height: 2200px; }
      .follow-prompt { margin-top: 4rem; }
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <section class="hero">
    <div class="hero-inner">
      <div class="eyebrow">denartes</div>
      <h1>Joel Dickinson</h1>
      <p class="tagline">Building things that matter,<br>one conviction at a time.</p>
      <div class="follow-prompt">Follow the path <span class="arrow">↓</span></div>
    </div>
  </section>

  <section class="path-section" aria-label="Follow the path">
    <svg id="trail" viewBox="0 0 1200 2600" preserveAspectRatio="none">
      <defs>
        <linearGradient id="trailGradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#d4b07a"/>
          <stop offset="100%" stop-color="#f1d3a5"/>
        </linearGradient>
      </defs>

      <path id="guidePath"
        d="M 600 90
           C 665 240, 420 360, 550 560
           C 690 785, 835 860, 700 1100
           C 565 1330, 355 1450, 470 1700
           C 590 1955, 830 2010, 725 2280
           C 665 2420, 620 2490, 610 2560"
        fill="none"
        stroke="url(#trailGradient)"
        stroke-width="3"
        stroke-linecap="round"
        class="trail-base trail-glow"></path>

      <path id="activePath"
        d="M 600 90
           C 665 240, 420 360, 550 560
           C 690 785, 835 860, 700 1100
           C 565 1330, 355 1450, 470 1700
           C 590 1955, 830 2010, 725 2280
           C 665 2420, 620 2490, 610 2560"
        fill="none"
        stroke="url(#trailGradient)"
        stroke-width="3.8"
        stroke-linecap="round"
        class="trail-active trail-glow"></path>

      <g id="movingNode" class="node-group">
        <circle r="20" fill="rgba(212,176,122,0.10)"></circle>
        <circle r="11" fill="rgba(212,176,122,0.26)"></circle>
        <circle class="node-core" r="5.5" fill="#f6ddbb"></circle>
      </g>
    </svg>
  </section>

  <div class="spacer"></div>

  <script>
    const pathSection = document.querySelector('.path-section');
    const guidePath = document.getElementById('guidePath');
    const activePath = document.getElementById('activePath');
    const movingNode = document.getElementById('movingNode');

    const totalLength = guidePath.getTotalLength();
    activePath.style.strokeDasharray = totalLength;
    activePath.style.strokeDashoffset = totalLength;

    function updatePath() {
      const rect = pathSection.getBoundingClientRect();
      const viewportH = window.innerHeight;

      const start = viewportH * 0.08;
      const end = rect.height - viewportH * 0.25;
      const traveled = Math.min(Math.max(start - rect.top, 0), end);
      const progress = Math.max(0, Math.min(traveled / end, 1));

      const drawLength = totalLength * progress;
      activePath.style.strokeDashoffset = totalLength - drawLength;

      const point = guidePath.getPointAtLength(Math.max(0.0001, drawLength));
      movingNode.setAttribute('transform', `translate(${point.x} ${point.y}) scale(${0.95 + progress * 0.12})`);
    }

    updatePath();
    window.addEventListener('scroll', updatePath, { passive: true });
    window.addEventListener('resize', updatePath);
  </script>
</body>
</html>
